name: Deploy to Server
on:
  push:
    branches: [ master ]
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

jobs:
  build-production:
    uses: ./.github/workflows/docker-publish.yml

  deploy-production:
    needs: build-production
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment:
      name: production
      url: https://staging.circuitverse.org

    steps:
      - name: Check Out Code
        uses: actions/checkout@v5

      - name: Set deploy image env (lowercase for GHCR)
        run: echo "KAMAL_IMAGE=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Set Up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2.0'

      - name: Install kamal
        run: gem install kamal --no-document

      - name: Show Kamal version
        run: kamal version

      - name: Validate required deploy env
        env:
          SERVER_IP: ${{ secrets.SERVER_IP }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
        run: bash ./bin/kamal-deploy-check

      - name: Write Kamal secrets file
        run: |
          mkdir -p .kamal
          printf '%s\n' \
            "KAMAL_GHCR_REGISTRY_PASSWORD=$KAMAL_GHCR_REGISTRY_PASSWORD" \
            "POSTGRES_URL=$POSTGRES_URL" \
            "RAILS_MASTER_KEY=$RAILS_MASTER_KEY" \
            "AWS_S3_ACCESS_KEY_ID=$AWS_S3_ACCESS_KEY_ID" \
            "AWS_S3_SECRET_ACCESS_KEY=$AWS_S3_SECRET_ACCESS_KEY" \
            "SECRET_KEY_BASE=$SECRET_KEY_BASE" \
            "RECAPTCHA_SITE_KEY=$RECAPTCHA_SITE_KEY" \
            "RECAPTCHA_SECRET_KEY=$RECAPTCHA_SECRET_KEY" \
            > .kamal/secrets-common
        env:
          AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          KAMAL_GHCR_REGISTRY_PASSWORD: ${{ github.token }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}

      - name: Deploy with kamal
        run: |
          kamal lock release
          kamal accessory boot yosys2digitaljs-server || true
          kamal proxy boot || true
          kamal redeploy -vvvv --skip_push
        env:
          RAILS_SERVE_STATIC_FILES: true
          AWS_S3_ACCESS_KEY_ID: ${{ secrets.AWS_S3_ACCESS_KEY_ID }}
          AWS_S3_SECRET_ACCESS_KEY: ${{ secrets.AWS_S3_SECRET_ACCESS_KEY }}
          BUGSNAG_API_KEY: ${{ secrets.BUGSNAG_API_KEY }}
          KAMAL_GHCR_REGISTRY_PASSWORD: ${{ github.token }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          RECAPTCHA_SITE_KEY: ${{ secrets.RECAPTCHA_SITE_KEY }}
          RECAPTCHA_SECRET_KEY: ${{ secrets.RECAPTCHA_SECRET_KEY }}
          KAMAL_IMAGE: ${{ env.KAMAL_IMAGE }}
          TRAEFIK_HOST: ${{ secrets.TRAEFIK_HOST }}
          KAMAL_REGISTRY_USERNAME: ${{ github.actor }}
